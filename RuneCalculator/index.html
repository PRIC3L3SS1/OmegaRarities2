const SUFFIX_MAP = {};
SUFFIXES.forEach(([val, suf]) => { SUFFIX_MAP[suf.toLowerCase()] = val; });

function parseSuffixNumber(str) {
  if (!str || str.trim() === "") return 0;
  str = str.trim();
  const num = parseFloat(str);
  if (!isNaN(num) && /^[\d.eE+\-]+$/.test(str)) return num;
  const match = str.match(/^([\d.eE+\-]+)\s*([a-zA-Z]+)$/);
  if (match) {
    const val = parseFloat(match[1]);
    const suf = match[2].toLowerCase();
    if (SUFFIX_MAP[suf] !== undefined) return val * SUFFIX_MAP[suf];
  }
  return NaN;
}

function formatNumber(n) {
  if (n === 0) return "0";
  const abs = Math.abs(n);
  if (abs < 0.0001) return n.toExponential(4);
  if (abs < 1000) return parseFloat(n.toFixed(6)).toString();
  if (abs < 1e6) return n.toLocaleString("en-US", { maximumFractionDigits: 2 });
  for (const [threshold, suf] of SUFFIXES) {
    if (abs >= threshold) return (n / threshold).toFixed(2).replace(/\.?0+$/, "") + suf;
  }
  return n.toLocaleString("en-US", { maximumFractionDigits: 2 });
}

function formatChance(n) {
  if (n === 1) return "Common";
  if (n >= 1e6) {
    for (const [threshold, suf] of SUFFIXES) {
      if (n >= threshold) return `1/${(n / threshold).toFixed(1).replace(/\.?0+$/, "")}${suf}`;
    }
  }
  return `1/${n.toLocaleString("en-US")}`;
}

function formatTime(seconds) {
  if (!isFinite(seconds) || seconds < 0) return "Never";
  if (seconds < 60) return `${Math.ceil(seconds)}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${Math.floor(seconds % 60)}s`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
  if (seconds < 86400 * 365) return `${Math.floor(seconds / 86400)}d ${Math.floor((seconds % 86400) / 3600)}h`;
  const years = seconds / (86400 * 365);
  if (years < 1000) return `${years.toFixed(1)} years`;
  return `${formatNumber(years)} years`;
}

function getCapMultipliers(reborn, challenge, frostLevel) {
  let basicCap = 1;
  if (reborn >= 3) basicCap *= 2;
  if (reborn >= 5) basicCap *= 2;
  if (reborn >= 6) basicCap *= 2;
  let rareCap = 1;
  if (reborn >= 5) rareCap *= 2;
  if (reborn >= 6) rareCap *= 2;
  let allRunes = 1 + frostLevel / 75;
  if (challenge >= 4) allRunes *= 2;
  return { basicCap, rareCap, allRunes };
}

function getEffectiveCapMult(rarity, mults) {
  if (rarity === "Basic") return mults.basicCap * mults.allRunes;
  if (rarity === "Rare") return mults.rareCap * mults.allRunes;
  return mults.allRunes;
}

function calcSingleBoostValue(count, per, op, effectiveCap) {
  let raw = count * per;
  if (effectiveCap && effectiveCap - 1 < raw) raw = effectiveCap - 1;
  if (op === "+x") return raw;
  return raw + 1;
}

function calculateBoost(rune, amount, capMult) {
  const results = [];
  for (const boost of rune.boosts) {
    const [stat, per, op, baseCap] = boost;
    const effectiveCap = baseCap * capMult;
    let raw = amount * per;
    if (effectiveCap && effectiveCap - 1 < raw) raw = effectiveCap - 1;
    const maxAmount = per > 0 ? Math.ceil((effectiveCap - 1) / per) : Infinity;
    let displayValue = op === "+x" ? `+${formatNumber(raw)}x` : `${formatNumber(raw + 1)}x`;
    const cappedPercent = Math.min(100, per > 0 ? (amount / maxAmount) * 100 : 0);
    results.push({ stat, per, op, baseCap, effectiveCap, raw, displayValue, maxAmount, cappedPercent, isCapped: amount >= maxAmount });
  }
  return results;
}

// ============================================================
// TIME TO MAX CALCULATION
// ============================================================

function calculateTimeToMax(params) {
  const { rune, chance, currentCount, baseRPS, baseLuck, capMult } = params;
  const THIRTY_DAYS = 30 * 86400;

  // Build the three feedback boost channels
  // Every rune implicitly has all three; if not present, per=0 and it stays at 1x
  const feedbackChannels = { bulk: null, luck: null, speed: null };
  for (const boost of rune.boosts) {
    const [stat, per, op, baseCap] = boost;
    if (stat === "Rune Bulk" && per > 0) feedbackChannels.bulk = { per, effectiveCap: baseCap * capMult };
    if (stat === "Rune Luck" && per > 0) feedbackChannels.luck = { per, effectiveCap: baseCap * capMult };
    if (stat === "Rune Speed" && per > 0) feedbackChannels.speed = { per, effectiveCap: baseCap * capMult };
  }

  // Collect active feedback boosts (per > 0)
  const feedbackBoosts = [];
  for (const [key, val] of Object.entries(feedbackChannels)) {
    if (val) feedbackBoosts.push({ ...val, key });
  }

  // Factor out current boost to get baseRate
  let currentMult = 1;
  for (const fb of feedbackBoosts) {
    let raw = currentCount * fb.per;
    if (fb.effectiveCap - 1 < raw) raw = fb.effectiveCap - 1;
    currentMult *= (raw + 1);
  }

  // baseRate = rate with all feedback boosts at 1x
  // RPS includes bulk & speed boosts, luck includes luck boost
  // We divide out everything to get the "naked" rate
  const baseRate = (baseRPS * (1 / chance) * baseLuck) / currentMult;

  // Helper: compute time from countA to countB using integration
  function computeTime(countA, countB) {
    if (countA >= countB) return 0;

    // Find all cap points within [countA, countB)
    const capPoints = [];
    for (const fb of feedbackBoosts) {
      const capCount = Math.ceil((fb.effectiveCap - 1) / fb.per);
      if (capCount > countA && capCount < countB) {
        capPoints.push(capCount);
      }
    }
    // Deduplicate and sort
    const uniqueCapPoints = [...new Set(capPoints)].sort((a, b) => a - b);
    const segments = [countA, ...uniqueCapPoints, countB];
    let totalTime = 0;

    for (let s = 0; s < segments.length - 1; s++) {
      const segA = segments[s];
      const segB = segments[s + 1];

      // Partition boosts into capped vs growing in this segment
      let constantMult = 1;
      const growingPers = [];

      for (const fb of feedbackBoosts) {
        const capCount = Math.ceil((fb.effectiveCap - 1) / fb.per);
        if (segA >= capCount) {
          constantMult *= fb.effectiveCap;
        } else {
          growingPers.push(fb.per);
        }
      }

      const R = baseRate * constantMult;

      if (growingPers.length === 0) {
        // All capped — constant rate
        totalTime += (segB - segA) / R;

      } else if (growingPers.length === 1) {
        // ∫ 1/(R·(np+1)) dn = (1/Rp)·ln((Ap+1)/(Bp+1))
        const p = growingPers[0];
        totalTime += (1 / (R * p)) * Math.log((segA * p + 1) / (segB * p + 1)) * -1;
        // Simplified: (1/(R*p)) * ln((segB*p+1)/(segA*p+1))
        // Which equals: (1/(R*p)) * [ln(segB*p+1) - ln(segA*p+1)]

      } else if (growingPers.length === 2 && growingPers[0] === growingPers[1]) {
        // ∫ 1/(R·(np+1)²) dn = -1/(Rp·(np+1)) evaluated A to B
        const p = growingPers[0];
        totalTime += (1 / (R * p)) * (1 / (segA * p + 1) - 1 / (segB * p + 1));

      } else if (growingPers.length === 2 && growingPers[0] !== growingPers[1]) {
        // Partial fractions: ∫ 1/(R·(np₁+1)(np₂+1)) dn
        // = 1/(R·(p₁-p₂)) · ln((np₁+1)/(np₂+1)) evaluated A to B
        const p1 = growingPers[0];
        const p2 = growingPers[1];
        const atB = Math.log((segB * p1 + 1) / (segB * p2 + 1));
        const atA = Math.log((segA * p1 + 1) / (segA * p2 + 1));
        totalTime += (1 / (R * (p1 - p2))) * (atB - atA);

      } else if (growingPers.length === 3) {
        // Three growing boosts — check for matching pairs
        const [p1, p2, p3] = growingPers;
        if (p1 === p2 && p2 === p3) {
          // All same: ∫ 1/(R·(np+1)³) dn = -1/(2Rp·(np+1)²) evaluated A to B
          const p = p1;
          totalTime += (1 / (2 * R * p)) * (1 / (segA * p + 1) ** 2 - 1 / (segB * p + 1) ** 2);
        } else if (p1 === p2) {
          // Two same + one different: ∫ 1/(R·(np₁+1)²·(np₃+1)) dn
          // Partial fractions, then integrate
          // Use numerical for safety
          totalTime += simpsonIntegrate(R, growingPers, segA, segB);
        } else {
          // All different or other combos — numerical
          totalTime += simpsonIntegrate(R, growingPers, segA, segB);
        }
      } else {
        // Fallback: numerical
        totalTime += simpsonIntegrate(R, growingPers, segA, segB);
      }
    }

    return totalTime;
  }

  function simpsonIntegrate(R, pers, a, b) {
    const n = 2000;
    const h = (b - a) / n;
    let sum = 0;
    for (let i = 0; i <= n; i++) {
      const c = a + i * h;
      let mult = 1;
      for (const p of pers) {
        mult *= (c * p + 1);
      }
      const weight = i === 0 || i === n ? 1 : i % 2 === 0 ? 2 : 4;
      sum += weight / (R * mult);
    }
    return (h / 3) * sum;
  }

  // Calculate time for each stat
  const statTimes = [];
  let practicalTime = 0;
  let practicalMaxCount = 0;

  for (const boost of rune.boosts) {
    const [stat, per, , baseCap] = boost;
    const effectiveCap = baseCap * capMult;
    const maxForThis = per > 0 ? Math.ceil((effectiveCap - 1) / per) : 0;

    if (maxForThis > 0) {
      const alreadyMaxed = currentCount >= maxForThis;
      let time = 0;
      if (!alreadyMaxed) {
        time = computeTime(currentCount, maxForThis);
      }
      const excluded = !alreadyMaxed && time > THIRTY_DAYS;

      statTimes.push({ stat, maxCount: maxForThis, time, excluded, alreadyMaxed });

      if (!excluded && !alreadyMaxed) {
        practicalTime = Math.max(practicalTime, time);
        practicalMaxCount = Math.max(practicalMaxCount, maxForThis);
      }
    }
  }

  // If everything is excluded, use the shortest
  if (practicalMaxCount === 0 && statTimes.length > 0) {
    const shortest = statTimes.filter(s => !s.alreadyMaxed).sort((a, b) => a.time - b.time)[0];
    if (shortest) {
      practicalTime = shortest.time;
      practicalMaxCount = shortest.maxCount;
    }
  }

  // Current rate for display
  const currentRate = baseRate * currentMult;

  // Compute hourly rate projection
  // We step forward in 1-hour increments, tracking count and rate
  const hourlyRates = [];
  const maxHours = Math.min(Math.ceil(practicalTime / 3600), 48); // cap at 48 hours
  
  if (practicalTime > 0 && maxHours > 0) {
    let simCount = currentCount;
    let simTime = 0;
    const hourStep = 3600; // 1 hour in seconds

    for (let h = 0; h <= maxHours; h++) {
      // Rate at current simCount
      let mult = 1;
      for (const fb of feedbackBoosts) {
        let raw = simCount * fb.per;
        if (fb.effectiveCap - 1 < raw) raw = fb.effectiveCap - 1;
        mult *= (raw + 1);
      }
      const rateAtCount = baseRate * mult;
      hourlyRates.push({ hour: h, count: Math.floor(simCount), rate: rateAtCount });

      if (h < maxHours) {
        // Advance 1 hour: how many runes gained?
        // For small steps, rate * dt is a good approximation
        // But for accuracy, use the integral inverse
        // Simple approach: use average of rate at start and estimated end
        const runesThisHour = rateAtCount * hourStep;
        simCount = Math.min(simCount + runesThisHour, practicalMaxCount);
        simTime += hourStep;
        if (simCount >= practicalMaxCount) break;
      }
    }
  }

  statTimes.sort((a, b) => a.time - b.time);

  return {
    time: practicalTime,
    maxCount: practicalMaxCount,
    targetPerSec: currentRate,
    statTimes,
    hourlyRates,
  };
}

function TimeToMaxCalculator({ capMults }) {
  const [selectedPack, setSelectedPack] = useState("1M Event");
  const [selectedRune, setSelectedRune] = useState("1M Absolute");
  const [currentCount, setCurrentCount] = useState("0");
  const [rpsInput, setRpsInput] = useState("");
  const [luckInput, setLuckInput] = useState("");
  const [result, setResult] = useState(null);

  const pack = RUNE_PACKS[selectedPack];
  const rune = pack?.runes[selectedRune];
  const sortedRunes = useMemo(() => pack ? Object.entries(pack.runes).sort((a, b) => a[1].order - b[1].order) : [], [pack]);

  const handlePackChange = (name) => {
    setSelectedPack(name);
    const sorted = Object.entries(RUNE_PACKS[name].runes).sort((a, b) => a[1].order - b[1].order);
    setSelectedRune(sorted[sorted.length - 1][0]); // default to rarest
    setResult(null);
  };

  const handleCalculate = useCallback(() => {
    if (!rune) return;
    const rps = parseSuffixNumber(rpsInput);
    const luck = parseSuffixNumber(luckInput);
    const count = parseSuffixNumber(currentCount) || 0;
    if (isNaN(rps) || isNaN(luck) || rps <= 0 || luck <= 0) return;

    const effectiveCapMult = getEffectiveCapMult(rune.rarity, capMults);
    const res = calculateTimeToMax({
      rune, chance: rune.chance, currentCount: count,
      baseRPS: rps, baseLuck: luck,
      capMult: effectiveCapMult,
    });
    setResult(res);
  }, [rune, rpsInput, luckInput, currentCount, capMults, selectedRune, selectedPack]);

  return (
    <>
      {/* Pack selector */}
      {[
        { label: "Events", packs: ["1M Event"] },
        { label: "Normal", packs: ["Slime", "Fire", "Plasma", "Snow", "Frost", "Snowflakes", "Stardust", "Comets", "Meteors", "Ash", "Lava"] },
      ].map((group) => (
        <div key={group.label} style={{ marginBottom: 12 }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "2px", textTransform: "uppercase", color: css.textDim, marginBottom: 6 }}>{group.label}</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {group.packs.map((name) => {
              const data = RUNE_PACKS[name]; if (!data) return null;
              return (<button key={name} onClick={() => handlePackChange(name)} style={{ padding: "8px 14px", borderRadius: 8, whiteSpace: "nowrap", border: `1px solid ${selectedPack === name ? data.color + "60" : css.border}`, background: selectedPack === name ? data.color + "18" : css.surface, cursor: "pointer", fontFamily: "'Chakra Petch', sans-serif", fontSize: 13, fontWeight: selectedPack === name ? 700 : 500, color: selectedPack === name ? data.color : css.textDim }}>{name}</button>);
            })}
          </div>
        </div>
      ))}

      {/* Rune selector */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: 6, marginBottom: 20 }}>
        {sortedRunes.map(([name, data]) => {
          const sel = name === selectedRune;
          return (<button key={name} onClick={() => { setSelectedRune(name); setResult(null); }} style={{ background: sel ? data.color + "18" : css.surface, border: `1px solid ${sel ? data.color + "60" : css.border}`, borderRadius: 8, padding: "10px 6px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
            <span style={{ fontFamily: "'Chakra Petch', sans-serif", fontSize: 11, fontWeight: sel ? 700 : 500, color: sel ? data.color : css.text, textAlign: "center", lineHeight: 1.2 }}>{name}</span>
            <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: RARITY_COLORS[data.rarity], fontWeight: 600, letterSpacing: "1px", textTransform: "uppercase" }}>{data.rarity}</span>
          </button>);
        })}
      </div>

      {/* Inputs */}
      <div style={panelStyle}>
        <div style={panelGlow} />
        <div style={panelTitleStyle}>Your Stats</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
          <div>
            <label style={labelStyle}>Rolls Per Second (RPS)</label>
            <input type="text" value={rpsInput} onChange={(e) => setRpsInput(e.target.value)} style={inputStyle} placeholder="e.g. 23NoVt or 1B" />
          </div>
          <div>
            <label style={labelStyle}>Rune Luck</label>
            <input type="text" value={luckInput} onChange={(e) => setLuckInput(e.target.value)} style={inputStyle} placeholder="e.g. 3.3Sx or 2.3e8" />
          </div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <label style={labelStyle}>Current Count</label>
          <input type="text" value={currentCount} onChange={(e) => setCurrentCount(e.target.value)} style={inputStyle} placeholder="0" />

        <button onClick={handleCalculate} style={{
          width: "100%", padding: "14px", borderRadius: 8,
          background: `linear-gradient(135deg, ${css.accent}, #1088cc)`,
          border: "none", cursor: "pointer",
          fontFamily: "'Chakra Petch', sans-serif", fontSize: 16,
          fontWeight: 700, color: "#000", letterSpacing: "1px",
        }}>CALCULATE TIME TO MAX</button>
      </div>

      {/* Results */}
      {result && rune && (
        <div style={panelStyle}>
          <div style={panelGlow} />
          <div style={panelTitleStyle}>Results — {selectedRune}</div>

          <div style={{ display: "flex", gap: 20, marginBottom: 20, flexWrap: "wrap" }}>

                {formatNumber(result.maxCount)}

            </div>
          </div>

          {/* Per-stat time breakdown */}
          {result.statTimes && result.statTimes.length > 0 && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 10, color: css.textDim, fontFamily: "'JetBrains Mono', monospace", marginBottom: 8, letterSpacing: "1px" }}>STAT COMPLETION</div>
              {result.statTimes.map((st, i) => (
                <div key={i} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "8px 12px", marginBottom: 4,
                  background: st.alreadyMaxed ? css.accentDim : css.bg,
                  borderRadius: 6, border: `1px solid ${st.alreadyMaxed ? css.accent + "40" : css.border}`,
                  opacity: st.excluded ? 0.5 : 1,
                }}>
                  <span style={{ fontFamily: "'Chakra Petch', sans-serif", fontSize: 13, color: st.alreadyMaxed ? css.accent : css.textBright, fontWeight: 600, minWidth: 120 }}>
                    {st.stat}
                  </span>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: css.textDim }}>
                    {formatNumber(st.maxCount)} runes
                  </span>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: st.alreadyMaxed ? css.accent : st.excluded ? css.textDim : css.textBright, fontWeight: 600 }}>
                    {st.alreadyMaxed ? "Maxed" : st.excluded ? ">30 days" : formatTime(st.time)}
                  </span>
                </div>
              ))}
            </div>
          )}

          {/* Rate info */}
          {result.targetPerSec > 0 && (
            <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: css.textDim, textAlign: "center", marginBottom: 16 }}>
              Current: {formatNumber(result.targetPerSec)}/sec · {formatNumber(result.targetPerSec * 3600)}/hr
            </div>
          )}

          {/* Hourly rate projection */}
          {result.hourlyRates && result.hourlyRates.length > 1 && result.time > 3600 && (
            <div>
              <div style={{ fontSize: 10, color: css.textDim, fontFamily: "'JetBrains Mono', monospace", marginBottom: 8, letterSpacing: "1px" }}>PROJECTED RATE</div>
              {result.hourlyRates.map((hr, i) => {
                const isLast = i === result.hourlyRates.length - 1;
                const prevRate = i > 0 ? result.hourlyRates[i - 1].rate * 3600 : null;
                const currRateHr = hr.rate * 3600;
                const acceleration = prevRate ? ((currRateHr - prevRate) / prevRate * 100).toFixed(1) : null;
                return (
                  <div key={i} style={{
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    padding: "6px 12px", marginBottom: 2,
                    background: css.bg,
                    borderRadius: 6, border: `1px solid ${css.border}`,
                  }}>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: css.textDim, minWidth: 50 }}>
                      {hr.hour === 0 ? "Now" : `${hr.hour}h`}
                    </span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: css.textDim }}>
                      {formatNumber(hr.count)} runes
                    </span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: css.textBright, fontWeight: 600 }}>
                      {formatNumber(currRateHr)}/hr
                    </span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: acceleration && parseFloat(acceleration) > 0 ? css.accent : css.textDim, minWidth: 55, textAlign: "right" }}>
                      {acceleration ? `+${acceleration}%` : ""}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </>
  );
}

            {[
              { label: "Basic Cap", value: capMults.basicCap * capMults.allRunes },
              { label: "Rare Cap", value: capMults.rareCap * capMults.allRunes },
              { label: "Other Cap", value: capMults.allRunes },
            ].map((item) => (
              <div key={item.label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 10, color: css.textDim, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "1px", textTransform: "uppercase" }}>{item.label}:</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700, color: css.textDim }}>x{Number.isInteger(item.value) ? item.value : item.value.toFixed(2)}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Tab content */}
        {tab === "boost" && <BoostCalculator capMults={capMults} />}
        {tab === "time" && <TimeToMaxCalculator capMults={capMults} />}

        {/* Footer */}
        <div style={{ marginTop: 32, textAlign: "center", fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: css.textDim, lineHeight: 1.8 }}>
          Caps scale with Reborn level, Challenge tier & Frost Upgrade 6
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RuneCalculator));
  </script>
</body>
</html>
