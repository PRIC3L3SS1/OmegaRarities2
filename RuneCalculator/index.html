function Latex({ children, block }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.katex) {
      try {
        window.katex.render(children, ref.current, {
          throwOnError: false,
          displayMode: !!block,
        });
      } catch (e) {}
    }
  }, [children, block]);

  if (block) {
    return React.createElement("div", {
      ref,
      style: {
        background: "#0a0c10",
        border: "1px solid #2a3040",
        borderRadius: 6,
        padding: "14px 18px",
        marginBottom: 10,
        textAlign: "center",
        overflowX: "auto",
      },
    });
  }
  return React.createElement("span", { ref });
}


const SUFFIXES = [
  [1e303, "Ce"],
  [1e150, "NoQg"],[1e147, "OcQg"],[1e144, "SpQg"],[1e141, "SxQg"],
  [1e138, "QnQg"],[1e135, "QaQg"],[1e132, "TQg"],[1e129, "DQg"],
  [1e126, "UQg"],[1e123, "Qg"],
  [1e120, "NoTg"],[1e117, "OcTg"],[1e114, "SpTg"],[1e111, "SxTg"],
  [1e108, "QnTg"],[1e105, "QaTg"],[1e102, "TTg"],[1e99, "DTg"],
  [1e96, "UTg"],[1e93, "Tg"],
  [1e90, "NoVt"],[1e87, "OcVt"],[1e84, "SpVt"],[1e81, "SxVt"],
  [1e78, "QnVt"],[1e75, "QaVt"],
  [1e72, "TVt"],[1e69, "DVt"],[1e66, "UVt"],[1e63, "Vt"],
  [1e60, "NoDe"],[1e57, "OcDe"],[1e54, "SpDe"],[1e51, "SxDe"],
  [1e48, "QnDe"],[1e45, "QdDe"],[1e42, "TDe"],[1e39, "DDe"],
  [1e36, "UDe"],[1e33, "De"],[1e30, "No"],[1e27, "Oc"],
  [1e24, "Sp"],[1e21, "Sx"],[1e18, "Qn"],[1e15, "Qd"],
  [1e12, "T"],[1e9, "B"],[1e6, "M"],[1e3, "K"],
];

const SUFFIX_MAP = {};
SUFFIXES.forEach(([val, suf]) => { SUFFIX_MAP[suf.toLowerCase()] = val; });

function parseSuffixNumber(str) {
  if (!str || str.trim() === "") return 0;
  str = str.trim();
  const num = parseFloat(str);
  if (!isNaN(num) && /^[\d.eE+\-]+$/.test(str)) return num;
  const match = str.match(/^([\d.eE+\-]+)\s*([a-zA-Z]+)$/);
  if (match) {
    const val = parseFloat(match[1]);
    const suf = match[2].toLowerCase();
    if (SUFFIX_MAP[suf] !== undefined) return val * SUFFIX_MAP[suf];
  }
  return NaN;
}

function formatNumber(n) {
  if (n === 0) return "0";
  const abs = Math.abs(n);
  if (abs < 0.0001) return n.toExponential(2);
  if (abs < 1000) return parseFloat(n.toFixed(6)).toString();
  if (abs >= 1e100) return n.toExponential(2);
  if (abs < 1e6) return n.toLocaleString("en-US", { maximumFractionDigits: 2 });
  for (const [threshold, suf] of SUFFIXES) {
    if (abs >= threshold) return (n / threshold).toFixed(2).replace(/\.?0+$/, "") + suf;
  }
  return n.toLocaleString("en-US", { maximumFractionDigits: 2 });
}

function formatChance(n) {
  if (n === 1) return "Common";
  if (n >= 1e100) return `1/${n.toExponential(2)}`;
  if (n >= 1e6) {
    for (const [threshold, suf] of SUFFIXES) {
      if (n >= threshold) return `1/${(n / threshold).toFixed(2).replace(/\.?0+$/, "")}${suf}`;
    }
  }
  return `1/${n.toLocaleString("en-US")}`;
}

function formatTime(seconds) {
  if (!isFinite(seconds) || seconds < 0) return "Never";
  if (seconds < 60) return `${Math.ceil(seconds)}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${Math.floor(seconds % 60)}s`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
  if (seconds < 86400 * 365) return `${Math.floor(seconds / 86400)}d ${Math.floor((seconds % 86400) / 3600)}h`;
  const years = seconds / (86400 * 365);
  if (years < 1000) return `${years.toFixed(1)} years`;
  return `${formatNumber(years)} years`;
}

function getCapMultipliers(reborn, challenge, frostLevel) {
  let basicCap = 1;
  if (reborn >= 3) basicCap *= 2;
  if (reborn >= 5) basicCap *= 2;
  if (reborn >= 6) basicCap *= 2;
  let rareCap = 1;
  if (reborn >= 5) rareCap *= 2;
  if (reborn >= 6) rareCap *= 2;
  let allRunes = 1 + frostLevel / 75;
  if (challenge >= 4) allRunes *= 2;
  return { basicCap, rareCap, allRunes };
}

function getEffectiveCapMult(rarity, mults, isEvent, noCapMult) {
  if (noCapMult) return 1;
  if (isEvent) return mults.allRunes;
  if (rarity === "Basic") return mults.basicCap * mults.allRunes;
  if (rarity === "Rare") return mults.rareCap * mults.allRunes;
  return mults.allRunes;
}

function calcSingleBoostValue(count, per, op, effectiveCap) {
  let raw = count * per;
  if (effectiveCap && effectiveCap - 1 < raw) raw = effectiveCap - 1;
  if (op === "+x") return raw;
  return raw + 1;
}

function calculateBoost(rune, amount, capMult) {
  const results = [];
  for (const boost of rune.boosts) {
    const [stat, per, op, baseCap] = boost;
    const effectiveCap = baseCap * capMult;
    let raw = amount * per;
    if (effectiveCap && effectiveCap - 1 < raw) raw = effectiveCap - 1;
    const maxAmount = per > 0 ? Math.ceil((effectiveCap - 1) / per) : Infinity;
    let displayValue = op === "+x" ? `+${formatNumber(raw)}x` : `${formatNumber(raw + 1)}x`;
    const cappedPercent = Math.min(100, per > 0 ? (amount / maxAmount) * 100 : 0);
    results.push({ stat, per, op, baseCap, effectiveCap, raw, displayValue, maxAmount, cappedPercent, isCapped: amount >= maxAmount });
  }
  return results;
}

// ============================================================
// TIME TO MAX CALCULATION
// ============================================================

function calculateTimeToMax(params) {
  const { rune, chance, currentCount, baseRPS, baseLuck, capMult } = params;
  const THIRTY_DAYS = 30 * 86400;

  // Build the three feedback boost channels
  // Every rune implicitly has all three; if not present, per=0 and it stays at 1x
  const feedbackChannels = { bulk: null, luck: null, speed: null };
  for (const boost of rune.boosts) {
    const [stat, per, op, baseCap] = boost;
    if (stat === "Rune Bulk" && per > 0) feedbackChannels.bulk = { per, effectiveCap: baseCap * capMult };
    if (stat === "Rune Luck" && per > 0) feedbackChannels.luck = { per, effectiveCap: baseCap * capMult };
    if (stat === "Rune Speed" && per > 0) feedbackChannels.speed = { per, effectiveCap: baseCap * capMult };
  }

  // Collect active feedback boosts (per > 0)
  const feedbackBoosts = [];
  for (const [key, val] of Object.entries(feedbackChannels)) {
    if (val) feedbackBoosts.push({ ...val, key });
  }

  // Factor out current boost to get baseRate
  let currentMult = 1;
  for (const fb of feedbackBoosts) {
    let raw = currentCount * fb.per;
    if (fb.effectiveCap - 1 < raw) raw = fb.effectiveCap - 1;
    currentMult *= (raw + 1);
  }

  // baseRate = rate with all feedback boosts at 1x
  // RPS includes bulk & speed boosts, luck includes luck boost
  // We divide out everything to get the "naked" rate
  const baseRate = (baseRPS * (1 / chance) * baseLuck) / currentMult;

  // Helper: compute time from countA to countB using integration
  function computeTime(countA, countB) {
    if (countA >= countB) return 0;

    // Find all cap points within [countA, countB)
    const capPoints = [];
    for (const fb of feedbackBoosts) {
      const capCount = Math.ceil((fb.effectiveCap - 1) / fb.per);
      if (capCount > countA && capCount < countB) {
        capPoints.push(capCount);
      }
    }
    // Deduplicate and sort
    const uniqueCapPoints = [...new Set(capPoints)].sort((a, b) => a - b);
    const segments = [countA, ...uniqueCapPoints, countB];
    let totalTime = 0;

    for (let s = 0; s < segments.length - 1; s++) {
      const segA = segments[s];
      const segB = segments[s + 1];

      // Partition boosts into capped vs growing in this segment
      let constantMult = 1;
      const growingPers = [];

      for (const fb of feedbackBoosts) {
        const capCount = Math.ceil((fb.effectiveCap - 1) / fb.per);
        if (segA >= capCount) {
          constantMult *= fb.effectiveCap;
        } else {
          growingPers.push(fb.per);
        }
      }

      const R = baseRate * constantMult;

      if (growingPers.length === 0) {
        // All capped — constant rate
        totalTime += (segB - segA) / R;

      } else if (growingPers.length === 1) {
        // ∫ 1/(R·(np+1)) dn = (1/Rp)·ln((Ap+1)/(Bp+1))
        const p = growingPers[0];
        totalTime += (1 / (R * p)) * Math.log((segA * p + 1) / (segB * p + 1)) * -1;
        // Simplified: (1/(R*p)) * ln((segB*p+1)/(segA*p+1))
        // Which equals: (1/(R*p)) * [ln(segB*p+1) - ln(segA*p+1)]

      } else if (growingPers.length === 2 && growingPers[0] === growingPers[1]) {
        // ∫ 1/(R·(np+1)²) dn = -1/(Rp·(np+1)) evaluated A to B
        const p = growingPers[0];
        totalTime += (1 / (R * p)) * (1 / (segA * p + 1) - 1 / (segB * p + 1));

      } else if (growingPers.length === 2 && growingPers[0] !== growingPers[1]) {
        // Partial fractions: ∫ 1/(R·(np₁+1)(np₂+1)) dn
        // = 1/(R·(p₁-p₂)) · ln((np₁+1)/(np₂+1)) evaluated A to B
        const p1 = growingPers[0];
        const p2 = growingPers[1];
        const atB = Math.log((segB * p1 + 1) / (segB * p2 + 1));
        const atA = Math.log((segA * p1 + 1) / (segA * p2 + 1));
        totalTime += (1 / (R * (p1 - p2))) * (atB - atA);

      } else if (growingPers.length === 3) {
        // Three growing boosts — check for matching pairs
        const [p1, p2, p3] = growingPers;
        if (p1 === p2 && p2 === p3) {
          // All same: ∫ 1/(R·(np+1)³) dn = -1/(2Rp·(np+1)²) evaluated A to B
          const p = p1;
          totalTime += (1 / (2 * R * p)) * (1 / (segA * p + 1) ** 2 - 1 / (segB * p + 1) ** 2);
        } else if (p1 === p2) {
          // Two same + one different: ∫ 1/(R·(np₁+1)²·(np₃+1)) dn
          // Partial fractions, then integrate
          // Use numerical for safety
          totalTime += simpsonIntegrate(R, growingPers, segA, segB);
        } else {
          // All different or other combos — numerical
          totalTime += simpsonIntegrate(R, growingPers, segA, segB);
        }
      } else {
        // Fallback: numerical
        totalTime += simpsonIntegrate(R, growingPers, segA, segB);
      }
    }

    return totalTime;
  }

  function simpsonIntegrate(R, pers, a, b) {
    const n = 2000;
    const h = (b - a) / n;
    let sum = 0;
    for (let i = 0; i <= n; i++) {
      const c = a + i * h;
      let mult = 1;
      for (const p of pers) {
        mult *= (c * p + 1);
      }
      const weight = i === 0 || i === n ? 1 : i % 2 === 0 ? 2 : 4;
      sum += weight / (R * mult);
    }
    return (h / 3) * sum;
  }

  // Calculate time for each stat
  const statTimes = [];
  let practicalTime = 0;
  let practicalMaxCount = 0;

  for (const boost of rune.boosts) {
    const [stat, per, op, baseCap] = boost;
    const effectiveCap = baseCap * capMult;
    const maxForThis = per > 0 ? Math.ceil((effectiveCap - 1) / per) : 0;

    if (maxForThis > 0) {
      const alreadyMaxed = currentCount >= maxForThis;
      let time = 0;
      if (!alreadyMaxed) {
        time = computeTime(currentCount, maxForThis);
      }
      const excluded = !alreadyMaxed && time > THIRTY_DAYS;

      // Calculate the max boost value for this stat
      const maxBoostDisplay = op === "+x" ? `+${formatNumber(effectiveCap - 1)}x` : `${formatNumber(effectiveCap)}x`;

      statTimes.push({ stat, maxCount: maxForThis, time, excluded, alreadyMaxed, maxBoostDisplay });

      if (!excluded && !alreadyMaxed) {
        practicalTime = Math.max(practicalTime, time);
        practicalMaxCount = Math.max(practicalMaxCount, maxForThis);
      }
    }
  }

  // If everything is excluded, use the shortest
  if (practicalMaxCount === 0 && statTimes.length > 0) {
    const shortest = statTimes.filter(s => !s.alreadyMaxed).sort((a, b) => a.time - b.time)[0];
    if (shortest) {
      practicalTime = shortest.time;
      practicalMaxCount = shortest.maxCount;
    }
  }

  // Current rate for display
  const currentRate = baseRate * currentMult;

  // Compute hourly rate projection
  // We step forward in 1-hour increments, tracking count and rate
  const hourlyRates = [];
  const maxHours = Math.min(Math.ceil(practicalTime / 3600), 48); // cap at 48 hours
  
  if (practicalTime > 0 && maxHours > 0) {
    let simCount = currentCount;
    let simTime = 0;
    const hourStep = 3600; // 1 hour in seconds

    for (let h = 0; h <= maxHours; h++) {
      // Rate at current simCount
      let mult = 1;
      for (const fb of feedbackBoosts) {
        let raw = simCount * fb.per;
        if (fb.effectiveCap - 1 < raw) raw = fb.effectiveCap - 1;
        mult *= (raw + 1);
      }
      const rateAtCount = baseRate * mult;
      hourlyRates.push({ hour: h, count: Math.floor(simCount), rate: rateAtCount });

      if (h < maxHours) {
        // Advance 1 hour: how many runes gained?
        // For small steps, rate * dt is a good approximation
        // But for accuracy, use the integral inverse
        // Simple approach: use average of rate at start and estimated end
        const runesThisHour = rateAtCount * hourStep;
        simCount = Math.min(simCount + runesThisHour, practicalMaxCount);
        simTime += hourStep;
        if (simCount >= practicalMaxCount) break;
      }
    }
  }

  statTimes.sort((a, b) => a.time - b.time);

  return {
    time: practicalTime,
    maxCount: practicalMaxCount,
    targetPerSec: currentRate,
    statTimes,
    hourlyRates,
  };
}

function BoostCalculator({ capMults }) {
  const [selectedPack, setSelectedPack] = useState("1M Event");
  const [selectedRune, setSelectedRune] = useState("1M Noob");
  const [amount, setAmount] = useState("1");

  const pack = RUNE_PACKS[selectedPack];
  const rune = pack?.runes[selectedRune];
  const effectiveCapMult = useMemo(() => rune ? getEffectiveCapMult(rune.rarity, capMults, pack?.isEvent, pack?.noCapMult) : 1, [rune, capMults, pack]);
  const sortedRunes = useMemo(() => pack ? Object.entries(pack.runes).sort((a, b) => a[1].order - b[1].order) : [], [pack]);
  const parsedAmount = parseSuffixNumber(amount) || 0;
  const boosts = useMemo(() => rune ? calculateBoost(rune, parsedAmount, effectiveCapMult) : [], [rune, parsedAmount, effectiveCapMult]);

  const handlePackChange = (name) => {
    setSelectedPack(name);
    const first = Object.entries(RUNE_PACKS[name].runes).sort((a, b) => a[1].order - b[1].order)[0][0];
    setSelectedRune(first);
  };

  const levelButton = (level, current, accentColor) => ({
    width: 30, height: 30, borderRadius: 6,
    border: `1px solid ${current === level ? accentColor + "60" : css.border}`,
    background: current === level ? accentColor + "20" : css.bg,
    color: current === level ? accentColor : css.textDim,
    fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
    fontWeight: current === level ? 700 : 400,
    cursor: "pointer", padding: 0,
    display: "flex", alignItems: "center", justifyContent: "center",
  });

  return (
    <>
      {/* Pack selector */}
      {[
        { label: "Events", packs: ["1M Event", "Leprechaun", "Ascended"] },
        { label: "Robux", packs: ["Premium", "Global"] },
        { label: "Normal", packs: ["Slime", "Fire", "Plasma", "Snow", "Frost", "Snowflakes", "Stardust", "Comets", "Meteors", "Ash", "Lava"] },
      ].map((group) => (
        <div key={group.label} style={{ marginBottom: 12 }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "2px", textTransform: "uppercase", color: css.textDim, marginBottom: 6 }}>{group.label}</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {group.packs.map((name) => {
              const data = RUNE_PACKS[name]; if (!data) return null;
              return (<button key={name} onClick={() => handlePackChange(name)} style={{ padding: "8px 14px", borderRadius: 8, whiteSpace: "nowrap", border: `1px solid ${selectedPack === name ? data.color + "60" : css.border}`, background: selectedPack === name ? data.color + "18" : css.surface, cursor: "pointer", fontFamily: "'Chakra Petch', sans-serif", fontSize: 13, fontWeight: selectedPack === name ? 700 : 500, color: selectedPack === name ? data.color : css.textDim }}>{name}</button>);
            })}
          </div>
        </div>
      ))}

      {/* Rune selector */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: 6, marginBottom: 20 }}>
        {sortedRunes.map(([name, data]) => {
          const sel = name === selectedRune;
          return (<button key={name} onClick={() => setSelectedRune(name)} style={{ background: sel ? data.color + "18" : css.surface, border: `1px solid ${sel ? data.color + "60" : css.border}`, borderRadius: 8, padding: "10px 6px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all 0.15s ease" }}>
            <span style={{ fontFamily: "'Chakra Petch', sans-serif", fontSize: 11, fontWeight: sel ? 700 : 500, color: sel ? data.color : css.text, textAlign: "center", lineHeight: 1.2 }}>{name}</span>
            <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: RARITY_COLORS[data.rarity], fontWeight: 600, letterSpacing: "1px", textTransform: "uppercase" }}>{data.rarity}</span>
            <span style={{ fontSize: 9, fontFamily: "'JetBrains Mono', monospace", color: css.textDim }}>{formatChance(data.chance)}</span>
          </button>);
        })}
      </div>

      {/* Input */}
      <div style={panelStyle}>
        <div style={panelGlow} />
        <label style={labelStyle}>Rune Count (supports suffixes like 1B, 3.5De)</label>
        <input type="text" value={amount} onChange={(e) => setAmount(e.target.value)} style={inputStyle} placeholder="e.g. 64350 or 1.5B" />
      </div>

      {/* Header */}
      {rune && (
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, padding: "14px 18px", background: rune.color + "10", border: `1px solid ${rune.color}30`, borderRadius: 10 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: rune.color, boxShadow: `0 0 12px ${rune.color}80`, flexShrink: 0 }} />
          <div style={{ flex: 1 }}>
            <span style={{ fontFamily: "'Chakra Petch', sans-serif", fontSize: 17, fontWeight: 700, color: rune.color }}>{selectedRune}</span>
            <span style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: RARITY_COLORS[rune.rarity], marginLeft: 10, fontWeight: 600, letterSpacing: "1px" }}>{rune.rarity.toUpperCase()}</span>
            {boosts.length > 0 && (() => {
              const max = Math.max(...boosts.map(b => b.maxAmount === Infinity ? 0 : b.maxAmount));
              return max > 0 ? <span style={{ fontSize: 10, color: css.textDim, marginLeft: 10, fontFamily: "'JetBrains Mono', monospace" }}>max all at {formatNumber(max)}</span> : null;
            })()}
          </div>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 15, color: css.textBright, fontWeight: 600 }}>x{formatNumber(parsedAmount)}</span>
        </div>
      )}

      {/* Boosts */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {boosts.map((b, i) => (
          <div key={i} style={{ ...panelStyle, marginBottom: 0, padding: "16px 18px" }}>
            <div style={panelGlow} />
            <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: `${b.cappedPercent}%`, background: b.isCapped ? css.yellowDim : rune.color + "10", transition: "width 0.3s ease", borderRadius: 10 }} />
            <div style={{ position: "relative", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

              <p style={{ marginBottom: 10 }}>Your acquisition rate at any rune count is:</p>
              <Latex block>{String.raw`r(n) = R_0 \cdot B(n) \cdot L(n) \cdot S(n)`}</Latex>

                <div><Latex>{String.raw`n`}</Latex> <span style={{ color: css.textDim }}>— current number of the target rune you own</span></div>
                <div><Latex>{String.raw`B(n)`}</Latex> <span style={{ color: css.textDim }}>— Rune Bulk multiplier at count </span><Latex>{String.raw`n`}</Latex></div>
                <div><Latex>{String.raw`L(n)`}</Latex> <span style={{ color: css.textDim }}>— Rune Luck multiplier at count </span><Latex>{String.raw`n`}</Latex></div>

              <Latex block>{String.raw`B(n) = \min(n \cdot p,\; C - 1) + 1`}</Latex>
              <div style={{ background: css.bg, border: `1px solid ${css.border}`, borderRadius: 6, padding: "12px 16px", marginBottom: 12, fontSize: 12, lineHeight: 2 }}>
                <div><Latex>{String.raw`p`}</Latex> <span style={{ color: css.textDim }}>— per-rune boost value (e.g. 0.000076 for 1M Absolute's Rune Bulk)</span></div>
                <div><Latex>{String.raw`C`}</Latex> <span style={{ color: css.textDim }}>— effective cap for this boost (base cap × progression multipliers)</span></div>
              </div>
              <p style={{ marginBottom: 10 }}>At <Latex>{String.raw`n = 0`}</Latex>, the boost is <Latex>{String.raw`1\times`}</Latex>. It grows linearly until <Latex>{String.raw`n \cdot p`}</Latex> reaches <Latex>{String.raw`C - 1`}</Latex>, at which point it's capped at <Latex>{String.raw`C\times`}</Latex>.</p>
              <p style={{ marginBottom: 10 }}>To find the total time from count <Latex>{String.raw`A`}</Latex> to count <Latex>{String.raw`B`}</Latex>, we integrate the inverse of the rate:</p>
              <Latex block>{String.raw`t = \int_{A}^{B} \frac{1}{r(n)}\, dn`}</Latex>
              <p style={{ marginBottom: 10 }}>When two boosts share the same per-rune rate <Latex>{String.raw`p`}</Latex> (e.g. Rune Bulk and Rune Luck on 1M Absolute), the rate becomes a perfect square <Latex>{String.raw`R_0 \cdot (np + 1)^2`}</Latex>, giving a clean antiderivative:</p>
              <Latex block>{String.raw`t = \frac{1}{R_0 \cdot p}\left[\frac{1}{Ap + 1} - \frac{1}{Bp + 1}\right]`}</Latex>
              <p style={{ marginBottom: 10 }}>For two boosts with different growth rates <Latex>{String.raw`p_1`}</Latex> and <Latex>{String.raw`p_2`}</Latex>, we use partial fraction decomposition:</p>
              <Latex block>{String.raw`t = \frac{1}{R_0(p_1 - p_2)}\left[\ln\!\frac{Bp_1 + 1}{Bp_2 + 1} - \ln\!\frac{Ap_1 + 1}{Ap_2 + 1}\right]`}</Latex>
              <p>The result is exact. No simulation or approximation (as I did originally try before using integration).</p>
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: css.accent, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 6 }}>Handling Cap Boundaries</div>
              <p>Different boosts cap at different rune counts. The calculator splits the integral at each cap boundary, solving a different equation for each segment. Before a cap, the boost accelerates your rate. After, it's constant. This means the time prediction naturally transitions from accelerating growth to linear growth as you approach and pass each cap.</p>
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: css.accent, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 6 }}>Base Rate Derivation</div>
              <p style={{ marginBottom: 10 }}>We derive the base rate by factoring out the target rune's current compounding boost contribution from your inputs:</p>
              <Latex block>{String.raw`R_0 = \frac{\text{RPS} \cdot \frac{1}{\text{chance}} \cdot \text{Luck}}{B(n_0) \cdot L(n_0) \cdot S(n_0)}`}</Latex>
              <div style={{ background: css.bg, border: `1px solid ${css.border}`, borderRadius: 6, padding: "12px 16px", marginBottom: 12, fontSize: 12, lineHeight: 2 }}>
                <div><Latex>{String.raw`\text{RPS}`}</Latex> <span style={{ color: css.textDim }}>— your rolls per second (includes clone, bulk, speed from all sources)</span></div>
                <div><Latex>{String.raw`\text{chance}`}</Latex> <span style={{ color: css.textDim }}>— the rune's base rarity (e.g. 9×10¹⁷ for 1M Absolute)</span></div>
                <div><Latex>{String.raw`\text{Luck}`}</Latex> <span style={{ color: css.textDim }}>— your total Rune Luck multiplier</span></div>
                <div><Latex>{String.raw`n_0`}</Latex> <span style={{ color: css.textDim }}>— your current count of the target rune</span></div>
              </div>
              <p>Your RPS already includes Rune Bulk and Speed boosts, and your Luck already includes the Rune Luck boost from the target rune. We divide these out at your current count <Latex>{String.raw`n_0`}</Latex>, isolating <Latex>{String.raw`R_0`}</Latex>. The integral then accurately models them growing back as <Latex>{String.raw`n`}</Latex> increases.</p>
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: css.accent, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 6 }}>Accuracy</div>
              <p>This calculator was validated against real in-game data. The predicted rates match observed acquisition speeds within a few percent, as RNG naturally can not be perfectly predicted. The acceleration curve correctly models the compounding feedback loop. The projected hourly rates above show exactly how your speed increases over time as boosts compound.</p>
            </div>

            <div>
              <div style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: css.accent, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 6 }}>But wait, how do you even know what runes cap at?</div>
              <p>Good question. For most runes you aren't able to figure that out on your own. Like, who would have known that 1M Absolute requires 400 trillion runes to max out the luck on it? I had to have help in order to figure out what runes cap at and their growth rate, that is where my friend Konami helped. </p>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

      }}>
        <div style={{ width: 18, height: 2, background: css.textDim, borderRadius: 1, transition: "all 0.2s", transform: sidebarOpen ? "rotate(45deg) translate(5px, 5px)" : "none" }} />
        <div style={{ width: 18, height: 2, background: css.textDim, borderRadius: 1, transition: "all 0.2s", opacity: sidebarOpen ? 0 : 1 }} />
        <div style={{ width: 18, height: 2, background: css.textDim, borderRadius: 1, transition: "all 0.2s", transform: sidebarOpen ? "rotate(-45deg) translate(5px, -5px)" : "none" }} />
      </button>

      <div style={{ position: "fixed", inset: 0, backgroundImage: `linear-gradient(${css.border} 1px, transparent 1px), linear-gradient(90deg, ${css.border} 1px, transparent 1px)`, backgroundSize: "60px 60px", opacity: 0.08, pointerEvents: "none", zIndex: 0 }} />

      <div style={{ position: "relative", zIndex: 1, maxWidth: 780, margin: "0 auto", padding: "32px 20px 60px" }}>

        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ marginBottom: 14 }}>
            <span style={{ display: "inline-block", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "2px", textTransform: "uppercase", color: css.accent, background: css.accentDim, border: `1px solid ${css.accent}`, borderRadius: 4, padding: "4px 12px" }}>OR2 TOOL BY PRICE AND KONAMI</span>
          </div>
          <h1 style={{ fontSize: 28, fontWeight: 700, color: css.textBright, letterSpacing: "1px", lineHeight: 1.2, margin: 0 }}>
            OR2 <span style={{ color: css.accent }}>Rune</span> Calculator
          </h1>
        </div>

        {/* Tab bar */}
        <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
          {tabs.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: 1, padding: "12px", borderRadius: 8,
              border: `1px solid ${tab === t.id ? css.accent + "60" : css.border}`,
              background: tab === t.id ? css.accentDim : css.surface,
              cursor: "pointer",
              fontFamily: "'Chakra Petch', sans-serif", fontSize: 14,
              fontWeight: tab === t.id ? 700 : 500,
              color: tab === t.id ? css.accent : css.textDim,
              letterSpacing: "0.5px",
            }}>{t.label}</button>
          ))}
        </div>

        {/* Progression Settings */}
        <div style={panelStyle}>
          <div style={panelGlow} />
          <div style={panelTitleStyle}>Your Progression</div>
          <div style={{ display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap" }}>
            <div>
              <label style={labelStyle}>Reborn Level</label>
              <div style={{ display: "flex", gap: 4 }}>
                {[0, 1, 2, 3, 4, 5, 6].map((level) => (
                  <button key={level} onClick={() => setReborn(level)} style={{
                    width: 30, height: 30, borderRadius: 6,
                    border: `1px solid ${reborn === level ? css.accent + "60" : css.border}`,
                    background: reborn === level ? css.accent + "20" : css.bg,
                    color: reborn === level ? css.accent : css.textDim,
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
                    fontWeight: reborn === level ? 700 : 400, cursor: "pointer", padding: 0,
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{level}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={labelStyle}>Challenge</label>
              <div style={{ display: "flex", gap: 4 }}>
                {[0, 1, 2, 3, 4].map((level) => (
                  <button key={level} onClick={() => setChallenge(level)} style={{
                    width: 30, height: 30, borderRadius: 6,
                    border: `1px solid ${challenge === level ? "#ff78c860" : css.border}`,
                    background: challenge === level ? "#ff78c820" : css.bg,
                    color: challenge === level ? "#ff78c8" : css.textDim,
                    fontFamily: "'JetBrains Mono', monospace", fontSize: 12,
                    fontWeight: challenge === level ? 700 : 400, cursor: "pointer", padding: 0,
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}>{level}</button>
                ))}
              </div>
            </div>
            <div style={{ flex: 1, minWidth: 160 }}>
              <label style={labelStyle}>Frost Upgrade 6</label>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input type="range" min={0} max={75} value={frostLevel} onChange={(e) => setFrostLevel(parseInt(e.target.value))} style={{ flex: 1, height: 6, appearance: "none", borderRadius: 3, background: `linear-gradient(to right, ${css.accent} ${(frostLevel / 75) * 100}%, ${css.bg} ${(frostLevel / 75) * 100}%)`, outline: "none", cursor: "pointer" }} />
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, fontWeight: 700, color: css.accent, minWidth: 28, textAlign: "right" }}>{frostLevel}</span>
              </div>
              <span style={{ fontSize: 10, color: css.textDim, fontFamily: "'JetBrains Mono', monospace" }}>x{(1 + frostLevel / 75).toFixed(2)} rune caps</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 16, marginTop: 16, paddingTop: 14, borderTop: `1px solid ${css.border}` }}>
            {[
              { label: "Basic Cap", value: capMults.basicCap * capMults.allRunes },
              { label: "Rare Cap", value: capMults.rareCap * capMults.allRunes },
              { label: "Other Cap", value: capMults.allRunes },
            ].map((item) => (
              <div key={item.label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 10, color: css.textDim, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "1px", textTransform: "uppercase" }}>{item.label}:</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700, color: css.textDim }}>x{Number.isInteger(item.value) ? item.value : item.value.toFixed(2)}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Tab content */}
        {tab === "boost" && <BoostCalculator capMults={capMults} />}
        {tab === "time" && <TimeToMaxCalculator capMults={capMults} />}

        {/* Footer */}
        <div style={{ marginTop: 32, textAlign: "center", fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: css.textDim, lineHeight: 1.8 }}>
          Caps scale with Reborn level, Challenge tier & Frost Upgrade 6
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RuneCalculator));
  </script>
</body>
</html>
